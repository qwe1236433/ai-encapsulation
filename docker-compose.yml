name: hermes-openclaw

services:
  hermes:
    build:
      context: ./hermes
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${HERMES_HOST_PORT:-8080}:8080"
    environment:
      OPENCLAW_URL: ${OPENCLAW_INTERNAL_URL:-http://openclaw:3000}
      # 勿用 0.0.0.0。本地 Ollama在宿主机时默认 host.docker.internal；改云端/其他地址在 .env 设 OLLAMA_HOST
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      HERMES_MODEL: ${HERMES_MODEL:-gemma4:26b}
      HERMES_LLM_ENABLED: ${HERMES_LLM_ENABLED:-true}
      HERMES_OLLAMA_TIMEOUT_SEC: ${HERMES_OLLAMA_TIMEOUT_SEC:-120}
      HERMES_TAVC_MAX_ATTEMPTS: ${HERMES_TAVC_MAX_ATTEMPTS:-3}
      HERMES_SESSIONS_DIR: ${HERMES_SESSIONS_DIR:-/app/sessions}
      HERMES_LLM_VERIFY_MODE: ${HERMES_LLM_VERIFY_MODE:-always}
      HERMES_PROCESS_TIMEOUT_SEC: ${HERMES_PROCESS_TIMEOUT_SEC:-120}
      HERMES_VERIFY_DOUBT_LOW: ${HERMES_VERIFY_DOUBT_LOW:-0.12}
      HERMES_VERIFY_DOUBT_HIGH: ${HERMES_VERIFY_DOUBT_HIGH:-0.88}
      TRAFFIC_SIM_BOOST_KEYWORD: ${TRAFFIC_SIM_BOOST_KEYWORD:-救命}
      TRAFFIC_SIM_LIKES_IF_HIT: ${TRAFFIC_SIM_LIKES_IF_HIT:-1000}
      TRAFFIC_SIM_LIKES_ELSE: ${TRAFFIC_SIM_LIKES_ELSE:-10}
      TRAFFIC_SIM_PASS_MIN: ${TRAFFIC_SIM_PASS_MIN:-500}
      TRAFFIC_SIM_CTR_PASS_MIN: ${TRAFFIC_SIM_CTR_PASS_MIN:-3.0}
      HERMES_VERIFY_GOAL_ALIGNMENT: ${HERMES_VERIFY_GOAL_ALIGNMENT:-false}
      HERMES_CORRECT_PIVOT_PROB: ${HERMES_CORRECT_PIVOT_PROB:-0.35}
      HERMES_EXPLORE_EPSILON: ${HERMES_EXPLORE_EPSILON:-0.25}
      HERMES_SOFT_VERIFY_ENABLED: ${HERMES_SOFT_VERIFY_ENABLED:-false}
      TRAFFIC_SCORE_USE_LOG: ${TRAFFIC_SCORE_USE_LOG:-true}
      TRAFFIC_SCORE_LOG_CEIL_LIKES: ${TRAFFIC_SCORE_LOG_CEIL_LIKES:-}
      HERMES_NEGATIVE_POOL_ENABLED: ${HERMES_NEGATIVE_POOL_ENABLED:-true}
      HERMES_NEGATIVE_POOL_MAX: ${HERMES_NEGATIVE_POOL_MAX:-64}
      HERMES_NEGATIVE_POOL_DECAY_ROUNDS: ${HERMES_NEGATIVE_POOL_DECAY_ROUNDS:-12}
      HERMES_NEGATIVE_SOFT_RETRY_PROB: ${HERMES_NEGATIVE_SOFT_RETRY_PROB:-0.01}
      HERMES_NEGATIVE_POOL_DECAY_SEC: ${HERMES_NEGATIVE_POOL_DECAY_SEC:-0}
      TRAFFIC_SCORE_DYNAMIC_CEIL: ${TRAFFIC_SCORE_DYNAMIC_CEIL:-true}
      TRAFFIC_SCORE_DYNAMIC_K: ${TRAFFIC_SCORE_DYNAMIC_K:-24}
      TRAFFIC_SCORE_DYNAMIC_MIN_N: ${TRAFFIC_SCORE_DYNAMIC_MIN_N:-4}
      TRAFFIC_SCORE_DYNAMIC_QUANTILE: ${TRAFFIC_SCORE_DYNAMIC_QUANTILE:-0.9}
      TRAFFIC_SCORE_DYNAMIC_CEIL_MULT: ${TRAFFIC_SCORE_DYNAMIC_CEIL_MULT:-1.12}
      TRAFFIC_SCORE_DYNAMIC_STATIC_WEIGHT: ${TRAFFIC_SCORE_DYNAMIC_STATIC_WEIGHT:-0.55}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # 小红书多档拉数间隔（秒）：默认 6,12,24便于本地测；生产可改为 21600,43200,86400
      # HERMES_XHS_POLL_INTERVALS_SEC: ${HERMES_XHS_POLL_INTERVALS_SEC:-6,12,24}
    volumes:
      - ${HERMES_CONFIG_FILE:-D:/ai封装/hermes/config.yaml}:/app/config.yaml:ro
      - ${HERMES_SESSIONS_DIR:-D:/ai封装/hermes/sessions}:/app/sessions
    restart: unless-stopped

  openclaw:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${OPENCLAW_HOST_PORT:-3000}:3000"
    environment:
      HERMES_URL: ${HERMES_INTERNAL_URL:-http://hermes:8080}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-}
      MINIMAX_GROUP_ID: ${MINIMAX_GROUP_ID:-}
      MINIMAX_TIMEOUT_SEC: ${MINIMAX_TIMEOUT_SEC:-120}
      MINIMAX_MAX_COMPLETION_TOKENS: ${MINIMAX_MAX_COMPLETION_TOKENS:-2048}
      MINIMAX_PROBE_CACHE_SEC: ${MINIMAX_PROBE_CACHE_SEC:-120}
      MINIMAX_PROBE_TIMEOUT_SEC: ${MINIMAX_PROBE_TIMEOUT_SEC:-25}
      MINIMAX_PROBE_MAX_TOKENS: ${MINIMAX_PROBE_MAX_TOKENS:-64}
      OPENCLAW_MINIMAX_HEADLINE: ${OPENCLAW_MINIMAX_HEADLINE:-1}
      OPENCLAW_MINIMAX_BODY: ${OPENCLAW_MINIMAX_BODY:-1}
      OPENCLAW_MINIMAX_FACTORY: ${OPENCLAW_MINIMAX_FACTORY:-1}
      XHS_FACTORY_SAMPLES_PATH: ${XHS_FACTORY_SAMPLES_PATH:-}
      XHS_FACTORY_FEED_DIR: ${XHS_FACTORY_FEED_DIR:-}
      XHS_FACTORY_FEED_URL: ${XHS_FACTORY_FEED_URL:-}
      # 可选：train_baseline_v0产出；路径须落在 OPENCLAW_DATA_DIR 挂载内，如 /app/data/artifacts/baseline_v0.json
      XHS_FACTORY_BASELINE_JSON: ${XHS_FACTORY_BASELINE_JSON:-}
      XHS_FACTORY_BASELINE_MODE: ${XHS_FACTORY_BASELINE_MODE:-blend}
      XHS_FACTORY_BASELINE_WEIGHT: ${XHS_FACTORY_BASELINE_WEIGHT:-0.35}
      XHS_FACTORY_BASELINE_ASSUMED_LIKE: ${XHS_FACTORY_BASELINE_ASSUMED_LIKE:-100}
      OPENCLAW_PROMPTS_DIR: ${OPENCLAW_PROMPTS_DIR:-}
      OPENCLAW_SIMULATE_NOISE: ${OPENCLAW_SIMULATE_NOISE:-false}
      OPENCLAW_SIMULATE_FAILURE_RATE: ${OPENCLAW_SIMULATE_FAILURE_RATE:-0.25}
      TRAFFIC_SIM_BOOST_KEYWORD: ${TRAFFIC_SIM_BOOST_KEYWORD:-救命}
      TRAFFIC_SIM_LIKES_IF_HIT: ${TRAFFIC_SIM_LIKES_IF_HIT:-1000}
      TRAFFIC_SIM_LIKES_ELSE: ${TRAFFIC_SIM_LIKES_ELSE:-10}
      TRAFFIC_SIM_PASS_MIN: ${TRAFFIC_SIM_PASS_MIN:-500}
      TRAFFIC_SIM_CTR_PASS_MIN: ${TRAFFIC_SIM_CTR_PASS_MIN:-3.0}
      OPENCLAW_COMPOUND_WAIT_SEC: ${OPENCLAW_COMPOUND_WAIT_SEC:-2}
      OPENCLAW_COMPOUND_WAIT_MAX_SEC: ${OPENCLAW_COMPOUND_WAIT_MAX_SEC:-15}
    volumes:
      - ${OPENCLAW_CONFIG_FILE:-D:/ai封装/openclaw/config.yaml}:/app/config.yaml:ro
      - ${OPENCLAW_DATA_DIR:-D:/ai封装/openclaw/data}:/app/data
    gpus: all
    depends_on:
      - hermes
    restart: unless-stopped
