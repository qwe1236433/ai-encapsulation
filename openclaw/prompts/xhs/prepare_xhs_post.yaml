# 小红书工厂 — prepare_xhs_post（本地模板；{name} 由 main.py str.format）
# body_when_short：低保「成品笔记」骨架，禁止出现「开头共鸣/几条要点」等元指令句
version: 3

headline_when_short:
  template_a: "{topic}·{tone}视角"
  template_b: "{kw}·{topic}"
  hook_contrast: "以为{topic_16}很难？我亲测完这几步反而开窍了…"
  hook_number: "关于{topic_16}，我按这 3 件事重做了一遍"
  hook_warn: "{topic_16}先别盲冲！我帮你排掉最坑的一种"

body_when_short: |-
  救命！最近在琢磨「{topic_16}」真的上头，把自己踩过的坑捋成 3 条，建议先收藏再看。

  1️⃣ 别急着 all in：先算你每天能稳拿出的 1 小时
  2️⃣ 别被晒单带跑：问清楚多久能看到正反馈、试错成本多少
  3️⃣ 先做最小闭环：跑通一步再放大

  我这边和「{kw}」纠缠过一段时间，评论区说说你卡在哪，我尽量回～

image_prompt: "小红书竖版封面 1080x1440，主标题「{headline_24}」，风格偏{tone}，留白清晰、对比强。"

hashtags_fallback:
  topic_slice: 10
  topic_empty_fallback: "复盘"
  static_middle: "干货分享"
  tone_slice: 8
  tone_empty_fallback: "成长"

post_checklist:
  boost_where: "标题或正文前 80 字"
  emoji_note: "正文或标题旁至少 1 个相关 emoji"
  cta_note: "结尾引导评论/收藏/关注其一"

notes: "Post manually on XHS, then call Hermes POST /task/{id}/xhs-sync with real_note_id."
